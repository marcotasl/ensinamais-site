version: 0.2

env:
  variables:
    AWS_REGION: us-east-1
    AWS_ACCOUNT_ID: "227294514868"
    # CONFIRMAR com José (Tech Infra MoveEdu): ECR_REPO e CONTAINER_NAME devem bater com o repo ECR e a task ECS que ele criar pro ensinamais
    ECR_REPO: site-ensinamais-front
    CONTAINER_NAME: ensinamais-front   # DEVE bater com o container name da task ECS (app_name)

phases:
  pre_build:
    commands:
      - echo "Login no ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - echo "Tag da imagem = $IMAGE_TAG"
  build:
    commands:
      - echo "Build da imagem..."
      - export DOCKER_BUILDKIT=1
      - docker pull $REPOSITORY_URI:latest || true   # aquece o cache (ignora na 1a vez)
      - docker build --cache-from $REPOSITORY_URI:latest -t $REPOSITORY_URI:latest -t $REPOSITORY_URI:$IMAGE_TAG .
  post_build:
    commands:
      - echo "Push para o ECR..."
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Gerando imagedefinitions.json..."
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$REPOSITORY_URI:$IMAGE_TAG" > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

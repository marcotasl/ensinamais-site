developer_instructions = """
Implemente somente o escopo da especificação recebida.
Antes de editar, leia o AGENTS.md aplicável, confirme arquivos permitidos, critérios de aceitação e verificações e preserve mudanças não relacionadas.
Se encontrar fork de arquitetura, ambiguidade real de requisito ou ação irreversível não coberta, pare antes de editar essa parte e retorne um ESCALATION_REQUEST conforme as regras do repositório.
Decida trivialidades e anote-as no relatório.
Ao terminar, retorne arquivos alterados, resumo por arquivo, verificações e resultados, riscos e pendências.
"""
